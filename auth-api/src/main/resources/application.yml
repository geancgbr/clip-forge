spring:
  application:
    name: auth-api

  datasource:
    url:      ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/fiapx}
    username: ${SPRING_DATASOURCE_USERNAME:fiapx}
    password: ${SPRING_DATASOURCE_PASSWORD:fiapx}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

server:
  port: ${SERVER_PORT:8081}

jwt:
  secret:        ${JWT_SECRET:change-me-in-production-at-least-32-chars!!}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}   # 24h
